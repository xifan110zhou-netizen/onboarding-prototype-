<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新员工融入 · 交互稿 v2</title>
<style>
:root {
  --primary: #4A90E2;
  --primary-dark: #3a78c4;
  --primary-light: #eaf3ff;
  --bg: #f5f7fa;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #1f2937;
  --text-light: #6b7280;
  --text-muted: #9ca3af;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--text); background: var(--bg); height: 100vh; overflow: hidden; font-size: 14px;
}
/* ============ 顶部角色切换 ============ */
.role-switcher {
  background: #1f2937; color: #fff; padding: 0 24px; height: 44px;
  display: flex; align-items: center; gap: 16px; font-size: 13px;
}
.role-switcher .brand { font-weight: 600; }
.role-switcher .role-tabs { display: flex; gap: 4px; margin-left: 24px; }
.role-switcher .role-tab { padding: 4px 14px; border-radius: 4px; cursor: pointer; background: rgba(255,255,255,0.1); transition: 0.2s; }
.role-switcher .role-tab.active { background: var(--primary); }
.role-switcher .role-tab:hover:not(.active) { background: rgba(255,255,255,0.18); }
.role-switcher .hint { margin-left: auto; color: #9ca3af; font-size: 12px; }
/* ============ 整体框架 ============ */
.app { display: flex; flex-direction: column; height: calc(100vh - 44px); }
.workspace { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 220px; background: #fff; border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; flex-shrink: 0; }
.sidebar-section { padding: 8px 0; }
.sidebar-title { padding: 8px 20px; font-size: 12px; color: var(--text-light); font-weight: 600; letter-spacing: 0.5px; }
.nav-group { font-size: 13px; }
.nav-group > .nav-group-head {
  padding: 10px 20px; color: #4b5563; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
}
.nav-group > .nav-group-head:hover { background: var(--gray-50); }
.nav-item { padding: 9px 20px 9px 44px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #4b5563; font-size: 14px; border-left: 3px solid transparent; transition: 0.15s; }
.nav-item:hover { background: var(--gray-50); color: var(--primary); }
.nav-item.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); font-weight: 500; }
.nav-icon { font-size: 16px; }
.main { flex: 1; overflow-y: auto; padding: 24px 32px; }
.page { display: none; }
.page.active { display: block; }
/* ============ 通用 ============ */
.breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; color: var(--text-light); font-size: 13px; }
.breadcrumb a { color: var(--primary); text-decoration: none; cursor: pointer; }
.breadcrumb .sep { color: #d1d5db; }
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.page-title { font-size: 22px; font-weight: 600; }
.page-subtitle { color: var(--text-light); font-size: 13px; margin-top: 4px; }
.btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; color: var(--text); transition: 0.15s; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn:hover { border-color: var(--primary); color: var(--primary); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-dark); color: #fff; }
.btn-danger { background: #fff; color: var(--danger); border-color: #fecaca; }
.btn-danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-text { background: transparent; border: none; color: var(--primary); padding: 4px 8px; cursor: pointer; font-size: 13px; }
.btn-text:hover { color: var(--primary-dark); text-decoration: underline; }
.btn-text.danger { color: var(--danger); }
.btn-text.danger:hover { color: #b91c1c; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 12px; }
.toolbar-left, .toolbar-right { display: flex; gap: 8px; align-items: center; }
.search-input { padding: 7px 12px; border: 1px solid var(--border); border-radius: 4px; width: 240px; font-size: 13px; }
.filter-select { padding: 7px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; background: #fff; }
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab { padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-light); font-size: 14px; transition: 0.15s; }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
.tab .badge { background: var(--gray-100); color: var(--text-light); padding: 1px 7px; border-radius: 10px; font-size: 11px; margin-left: 5px; }
.tab.active .badge { background: var(--primary-light); color: var(--primary); }
.subtabs { display: inline-flex; background: var(--gray-100); border-radius: 6px; padding: 3px; gap: 2px; margin-bottom: 16px; }
.subtab { padding: 6px 16px; border-radius: 4px; cursor: pointer; color: var(--text-light); font-size: 13px; }
.subtab.active { background: #fff; color: var(--text); font-weight: 500; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
.table { width: 100%; border-collapse: collapse; background: #fff; }
.table th { text-align: left; padding: 11px 14px; background: var(--gray-50); border-bottom: 1px solid var(--border); color: var(--text-light); font-weight: 500; font-size: 13px; }
.table td { padding: 13px 14px; border-bottom: 1px solid var(--gray-100); font-size: 13px; vertical-align: middle; }
.table tr:hover { background: var(--gray-50); }
.table-name { color: var(--primary); font-weight: 500; cursor: pointer; }
.table-name:hover { text-decoration: underline; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
.tag-active { background: #d1fae5; color: #065f46; }
.tag-inactive { background: #f3f4f6; color: #6b7280; }
.tag-draft { background: #fef3c7; color: #92400e; }
.tag-progress { background: #dbeafe; color: #1e40af; }
.tag-done { background: #d1fae5; color: #065f46; }
.tag-expire { background: #fee2e2; color: #991b1b; }
.tag-cancel { background: #f3f4f6; color: #6b7280; }
.tag-todo { background: #fef3c7; color: #92400e; }
.tag-required { background: #fee2e2; color: #991b1b; }
.tag-optional { background: #e0e7ff; color: #3730a3; }
.tag-priority { background: #fce7f3; color: #9d174d; }
/* 头像 */
.avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.avatar-row { display: flex; align-items: center; gap: 8px; }
.avatar-row .meta { font-size: 12px; color: var(--text-light); }
/* 进度条 */
.progress-row { display: flex; align-items: center; gap: 10px; min-width: 140px; }
.progress-bar { flex: 1; height: 6px; background: var(--gray-100); border-radius: 3px; overflow: hidden; min-width: 80px; }
.progress-fill { height: 100%; background: var(--primary); border-radius: 3px; }
.progress-fill.done { background: var(--success); }
.progress-fill.danger { background: var(--danger); }
.progress-text { font-size: 12px; color: var(--text-light); min-width: 50px; }
/* ============ 弹窗 ============ */
.modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-mask.show { display: flex; }
.modal { background: #fff; border-radius: 8px; max-width: 560px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,0.18); }
.modal.lg { max-width: 720px; }
.modal.xl { max-width: 900px; }
.modal-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 18px; padding: 4px; }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
/* 表单 */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
.form-label .req { color: var(--danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 7px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px;
  background: #fff; font-family: inherit;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
.form-textarea { resize: vertical; min-height: 70px; }
.form-helper { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-section-title { font-size: 13px; color: var(--text-light); font-weight: 600; margin: 16px 0 12px; padding-bottom: 6px; border-bottom: 1px dashed var(--gray-200); }
/* 开关 */
.switch { position: relative; display: inline-block; width: 36px; height: 20px; vertical-align: middle; }
.switch input { display: none; }
.switch-slider { position: absolute; cursor: pointer; inset: 0; background: #cbd5e0; border-radius: 20px; transition: 0.2s; }
.switch-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
.switch input:checked + .switch-slider { background: var(--primary); }
.switch input:checked + .switch-slider::before { transform: translateX(16px); }
/* 状态指示点 */
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.dot.progress { background: var(--primary); }
.dot.done { background: var(--success); }
.dot.expire { background: var(--danger); }
.dot.cancel { background: #9ca3af; }
.dot.todo { background: var(--warning); }
/* 复选 */
.row-check { width: 14px; height: 14px; cursor: pointer; }
/* 计划详情 */
.detail-grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
.employee-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.employee-card .name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.employee-card .meta { color: var(--text-light); font-size: 13px; margin-bottom: 6px; }
.employee-card .progress-block { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--gray-100); }
.employee-card .label { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }
.employee-card .value { font-size: 14px; }
.kv-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
.kv-row .k { color: var(--text-light); }
.stage-block { background: #fff; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
.stage-head { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: var(--gray-50); border-bottom: 1px solid var(--border); }
.stage-head .stage-title { font-weight: 600; display: flex; align-items: center; gap: 8px; }
.stage-head .caret { transition: 0.2s; }
.stage-block.collapsed .stage-head .caret { transform: rotate(-90deg); }
.stage-block.collapsed .stage-body { display: none; }
.stage-body { padding: 0; }
.stage-stat { font-size: 12px; color: var(--text-light); }
/* 方案编辑详情页 */
.plan-edit-grid { display: grid; grid-template-columns: 260px 1fr; gap: 16px; align-items: start; }
.stage-list-panel { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.stage-list-panel .panel-head { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px 10px; border-bottom: 1px solid var(--gray-100); margin-bottom: 8px; }
.stage-list-panel .panel-head .title { font-weight: 600; font-size: 14px; }
.stage-item { padding: 10px 12px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
.stage-item:hover { background: var(--gray-50); }
.stage-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
.stage-item .num { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
.stage-item .actions { display: none; gap: 4px; }
.stage-item:hover .actions { display: flex; }
.stage-item.active .num { color: var(--primary); }
.template-panel { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
/* 字段预览 */
.field-preview-list { border: 1px dashed var(--gray-200); background: var(--gray-50); border-radius: 6px; padding: 12px; max-height: 220px; overflow-y: auto; }
.field-preview-item { padding: 8px 10px; background: #fff; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; }
.field-preview-item:last-child { margin-bottom: 0; }
.field-preview-item .ftype { color: var(--text-light); font-size: 11.5px; }
.field-preview-item .fname { font-weight: 500; }
.field-preview-item.locked { background: var(--gray-50); color: var(--text-light); }
/* 触发时机 容器 */
.trigger-block { padding: 12px; border: 1px dashed var(--gray-200); border-radius: 6px; margin-bottom: 12px; background: var(--gray-50); }
.trigger-block-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.trigger-block-head .trigger-title { font-size: 13px; font-weight: 500; }
.trigger-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.trigger-row .inline-input { width: 60px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; text-align: center; }
.trigger-disabled { opacity: 0.5; pointer-events: none; }
/* 钉钉提醒级联 */
.remind-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
.remind-row .lbl { width: 110px; color: var(--text-light); }
.remind-row select { flex: 1; }
/* 适用范围多选 chips */
.chip-list { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; border: 1px solid var(--border); border-radius: 4px; min-height: 38px; background: #fff; }
.chip { background: var(--primary-light); color: var(--primary); border-radius: 3px; padding: 2px 8px; font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
.chip .x { cursor: pointer; opacity: 0.7; }
.chip .x:hover { opacity: 1; }
.chip-input { border: none; outline: none; font-size: 13px; padding: 2px; min-width: 80px; flex: 1; background: transparent; }
/* toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 8px 16px; border-radius: 4px; font-size: 13px; z-index: 2000; opacity: 0; transition: 0.3s; }
.toast.show { opacity: 1; }
/* 设置侧通用提示 */
.alert { padding: 10px 14px; background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; border-radius: 4px; font-size: 13px; margin-bottom: 12px; }
.alert.info { background: var(--primary-light); border-color: #bfdbfe; color: #1e40af; }
/* 适用范围显示文本 */
.range-text { color: var(--text-light); font-size: 12px; }
/* 列表里的操作单元 */
.row-ops { display: inline-flex; gap: 4px; align-items: center; }
.row-ops .sep { color: var(--gray-200); }
/* 角色页面可见性控制 */
[data-role-only] { display: none; }
/* 计划详情 stage 状态 */
.stage-status-pill { font-size: 11px; padding: 1px 8px; border-radius: 10px; background: var(--gray-100); color: var(--text-light); margin-left: 8px; }
.stage-status-pill.in-progress { background: var(--primary-light); color: var(--primary); }
.stage-status-pill.done { background: #d1fae5; color: #065f46; }
/* 任务模板列表上的运行参数小标 */
.template-card { padding: 14px 16px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; background: #fff; }
.template-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.template-card-head .t-name { font-weight: 600; }
.template-card-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--text-light); }
.template-card-meta b { color: var(--text); font-weight: 500; }
/* 适用范围弹窗下拉树 */
.tree { font-size: 13px; }
.tree-node { padding: 4px 0; }
.tree-node label { cursor: pointer; display: flex; align-items: center; gap: 6px; }
.tree-children { margin-left: 18px; }
/* 添加任务弹窗里的 type/form 联动提示 */
.pick-hint { font-size: 12px; color: var(--text-light); padding: 6px 0; }
/* 空状态 */
.empty { text-align: center; padding: 40px; color: var(--text-light); font-size: 13px; }
.empty .icon { font-size: 36px; margin-bottom: 8px; }
/* 表单画布（办理弹窗用） */
.handler-form .field { margin-bottom: 14px; }
.handler-form .field label { display: block; margin-bottom: 6px; font-size: 13px; }
.handler-form .field .input, .handler-form .field input[type=text],
.handler-form .field input[type=date], .handler-form .field textarea, .handler-form .field select {
  width: 100%; padding: 7px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit;
}
.handler-form .field textarea { min-height: 80px; }
.handler-form .upload-area {
  border: 1px dashed var(--border); border-radius: 4px; padding: 14px; text-align: center;
  color: var(--text-light); font-size: 13px; cursor: pointer;
}
.handler-form .upload-area:hover { border-color: var(--primary); color: var(--primary); }
.handler-form .upload-list { margin-top: 8px; font-size: 12px; }
.handler-form .upload-list .file { padding: 4px 8px; background: var(--gray-50); border-radius: 3px; margin-bottom: 4px; display: flex; justify-content: space-between; }
/* 内置任务跳转面板 */
.builtin-jump { padding: 20px; text-align: center; background: var(--primary-light); border-radius: 6px; color: var(--text); }
.builtin-jump .icon { font-size: 32px; margin-bottom: 8px; }
/* 滚动条 */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<!-- ====== 顶部角色切换条 ====== -->
<div class="role-switcher">
  <span class="brand">公子起暖人事</span>
  <span style="color:#9ca3af;font-size:12px">交互稿 · 视角切换</span>
  <div class="role-tabs">
    <div class="role-tab active" data-role="hr" onclick="switchRole('hr')">HR · 人力资源</div>
    <div class="role-tab" data-role="handler" onclick="switchRole('handler')">办理人 · 直接经理</div>
    <div class="role-tab" data-role="employee" onclick="switchRole('employee')">员工 · 本人</div>
  </div>
  <span class="hint">演示用，仅作前端交互参考</span>
</div>

<div class="app">
  <div class="workspace">
    <!-- ====== 左侧栏 ====== -->
    <aside class="sidebar">
      <!-- HR 视角侧栏 -->
      <div data-role-show="hr" style="display:block">
        <div class="nav-group">
          <div class="nav-group-head"><span>📋 新员工管理</span></div>
          <div class="nav-item active" data-page="p2" onclick="goto('p2')">新员工融入</div>
          <div class="nav-item" data-page="p1" onclick="goto('p1')">融入任务</div>
        </div>
        <div class="nav-group" style="margin-top:8px">
          <div class="nav-group-head"><span>⚙️ 人事设置</span></div>
          <div class="nav-item" data-page="s1" onclick="goto('s1')">新员工融入设置 · 任务类型</div>
          <div class="nav-item" data-page="s2" onclick="goto('s2')">新员工融入设置 · 任务方案</div>
        </div>
      </div>
      <!-- 办理人/员工 视角侧栏 -->
      <div data-role-show="handler" style="display:none">
        <div class="nav-group">
          <div class="nav-group-head"><span>✅ 我的工作台</span></div>
          <div class="nav-item active" data-page="handler-list" onclick="goto('handler-list')">我负责的任务</div>
        </div>
      </div>
      <div data-role-show="employee" style="display:none">
        <div class="nav-group">
          <div class="nav-group-head"><span>👤 我的入职</span></div>
          <div class="nav-item active" data-page="employee-list" onclick="goto('employee-list')">我的融入任务</div>
        </div>
      </div>
    </aside>

    <!-- ====== 主区域 ====== -->
    <main class="main" id="main">
      <!-- 各 page 在这里 -->
    </main>
  </div>
</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<!-- ============================ 脚本 ============================ -->
<script>
// ===== 全局状态 =====
const state = {
  role: 'hr',          // hr / handler / employee
  page: 'p2',          // current page id

// ===== 工具 =====
function $(s, el=document) { return el.querySelector(s); }
function $$(s, el=document) { return Array.from(el.querySelectorAll(s)); }
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ===== 角色切换 =====
function switchRole(role) {
  state.role = role;
  $$('.role-tab').forEach(t => t.classList.toggle('active', t.dataset.role === role));
  $$('[data-role-show]').forEach(el => {
    el.style.display = el.dataset.roleShow === role ? 'block' : 'none';
  });
  if (role === 'hr') goto('p2');
  if (role === 'handler') goto('handler-list');
  if (role === 'employee') goto('employee-list');
}

// ===== 路由 =====
function goto(page, payload) {
  state.page = page;
  if (payload && payload.planId !== undefined) state.selectedPlanId = payload.planId;
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  renderMain();
}

// ===== 渲染入口 =====
function renderMain() {
  const m = $('#main');
  switch(state.page) {
    case 'p1': m.innerHTML = renderP1(); bindP1(); break;
    case 'p2': m.innerHTML = renderP2(); bindP2(); break;
    case 'plan-detail': m.innerHTML = renderPlanDetail(); bindPlanDetail(); break;
    case 's1': m.innerHTML = renderS1(); bindS1(); break;
    case 's2': m.innerHTML = renderS2(); bindS2(); break;
    case 's2-edit': m.innerHTML = renderS2Edit(); bindS2Edit(); break;
    case 'handler-list': m.innerHTML = renderHandlerList(); bindHandlerList(); break;
    case 'employee-list': m.innerHTML = renderEmployeeList(); bindHandlerList(); break;
    default: m.innerHTML = '';
  }
}

// ====== 工具：渲染头像 / 进度 ======
function renderAvatar(name) {
  return `<span class="avatar">${(name || '').slice(0, 1)}</span>`;
}
function renderEmpCell(name, sub) {
  return `<div class="avatar-row">${renderAvatar(name)}<div><div>${name}</div>${sub ? `<div class="meta">${sub}</div>` : ''}</div></div>`;
}
function renderProgress(done, total, expired = 0, cancelled = 0) {
  // 融入进度 = 已完成 / 未撤销
  const denom = Math.max(0, total - cancelled);
  const pct = denom === 0 ? 0 : Math.round(done / denom * 100);
  let cls = 'progress-fill';
  if (pct === 100) cls += ' done';
  if (expired > 0 && pct < 100) cls += ' danger';
  return `<div class="progress-row">
    <div class="progress-bar"><div class="${cls}" style="width:${pct}%"></div></div>
    <span class="progress-text">${done}/${denom} · ${pct}%</span>
  </div>`;
}
function planStatusTag(s) {
  const map = { progress: 'tag-progress', done: 'tag-done', cancel: 'tag-cancel' };
  return `<span class="tag ${map[s]}">${PLAN_STATUS[s]}</span>`;
}

function renderPlanDetail() {
  const plan = MOCK.plans.find(p => p.id === state.selectedPlanId);
  if (!plan) return `<div class="empty">未找到计划</div>`;

    if (t.status === 'expire') expired++;
    if (t.status === 'cancel') cancelled++;
    if (t.status === 'progress' || t.status === 'todo') progressCnt++;

  const denom = total - cancelled;
  const pct = denom === 0 ? 0 : Math.round(done / denom * 100);

  return `

    <a>人事</a><span class="sep">/</span><a>新员工管理</a><span class="sep">/</span>

    </div>
    <div>

  </div>

  <div class="detail-grid">
    <!-- 左：员工卡片 -->
    <div class="employee-card">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">

        <div>
          <div class="name">${plan.emp}</div>
          <div class="meta">${plan.dept} · ${plan.position}</div>
        </div>
      </div>
      <div class="kv-row"><span class="k">入职日期</span><span>${plan.joinDate}</span></div>
      <div class="kv-row"><span class="k">直接经理</span><span>${plan.manager}</span></div>
      <div class="kv-row"><span class="k">所属方案</span><span>${plan.planName}</span></div>
      <div class="kv-row"><span class="k">计划状态</span><span>${planStatusTag(plan.status)}</span></div>

      <div class="progress-block">
        <div class="label">融入进度（已完成 / 未撤销）</div>
        <div class="progress-row" style="margin-top:6px">
          <div class="progress-bar" style="height:8px"><div class="progress-fill ${pct===100?'done':''}" style="width:${pct}%"></div></div>
          <span class="progress-text" style="font-size:13px;color:var(--text)">${done}/${denom}</span>
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:12px">
          <div><span class="dot done"></span>已完成 ${done}</div>
          <div><span class="dot progress"></span>进行中 ${progressCnt}</div>
          <div><span class="dot expire"></span>已过期 ${expired}</div>
          <div><span class="dot cancel"></span>已撤销 ${cancelled}</div>
        </div>
      </div>
    </div>

    <!-- 右：阶段 + 任务列表 -->
    <div>
      ${stages.map((stg, idx) => renderStageBlock(stg, idx, plan)).join('')}

    <div class="modal">

        <p style="margin-top:8px;color:var(--text-light);font-size:13px">撤销后该任务对办理人不可见；计划不会因此进入终态，融入进度将按未撤销基数重新计算。</p>
        <div class="form-group" style="margin-top:14px">
          <label class="form-label">撤销原因</label>
          <textarea class="form-textarea" placeholder="选填"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeRevoke()">取消</button>
        <button class="btn btn-danger" onclick="confirmRevoke()">确认撤销</button>
      </div>
    </div>
  </div>

  <!-- 取消整份计划弹窗 -->
  <div class="modal-mask" id="cancelPlanMask">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">取消整份计划</div>
        <button class="modal-close" onclick="closeCancelPlan()">✕</button>

      <div class="modal-body">
        <p>取消计划后：</p>
        <ul style="margin:10px 0 10px 22px;color:var(--text-light);font-size:13px;line-height:1.8">

  </div>
  `;
}
function renderStageBlock(stg, idx, plan) {
  const total = stg.tasks.length;
  const doneNum = stg.tasks.filter(t => t.status === 'done').length;
  const allDone = doneNum === total;
  const hasProgress = stg.tasks.some(t => t.status === 'progress' || t.status === 'todo');
  let stagePill = '';
  if (allDone) stagePill = `<span class="stage-status-pill done">已完成</span>`;
  else if (hasProgress) stagePill = `<span class="stage-status-pill in-progress">进行中</span>`;

  return `
  <div class="stage-block" data-stage="${idx}">
    <div class="stage-head" onclick="toggleStage(${idx})">
      <div class="stage-title">
        <span style="color:var(--text-muted);font-size:12px">阶段 ${idx + 1}</span>
        <span>${stg.name}</span>
        ${stagePill}
        <span class="stage-stat">${doneNum}/${total}</span>
      </div>
      <span class="caret">▼</span>
    </div>
    <div class="stage-body">
      <table class="table">
        <thead>
          <tr>
            <th>任务名称</th>
            <th style="width:170px">任务类型</th>
            <th style="width:180px">办理人</th>
            <th style="width:120px">开始日</th>
            <th style="width:120px">截止日</th>
            <th style="width:100px">状态</th>
            <th style="width:110px">操作</th>
          </tr>
        </thead>
        <tbody>
          ${stg.tasks.map(t => {
            const st = STATUS_LABEL[t.status];
            const canRevoke = (t.status === 'progress' || t.status === 'todo');
            return `
            <tr>
              <td>${t.name}</td>
              <td><span class="range-text">${t.type}</span></td>
              <td>${t.handler}</td>
              <td>${t.start}</td>
              <td>${t.due}</td>
              <td><span class="tag ${st.cls}"><span class="dot ${st.dot}"></span>${st.label}</span></td>
              <td>${canRevoke ? `<button class="btn-text danger" onclick="openRevoke('${t.id}','${t.name.replace(/'/g,'')}')">撤销</button>` : '<span style="color:var(--text-muted)">—</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

  $(`.stage-block[data-stage="${idx}"]`).classList.toggle('collapsed');

  const allSubs = [
    ...MOCK.taskTypes.builtin.map(x => ({ ...x, kind: 'builtin' })),
    ...MOCK.taskTypes.custom.map(x => ({ ...x, kind: 'custom' })),
  ];
  return `
  <div class="modal-mask" id="addTplMask">
    <div class="modal xl">
      <div class="modal-header">
        <div class="modal-title" id="addTplTitle">添加任务模板</div>
        <button class="modal-close" onclick="closeAddTemplateModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <!-- 左侧：基础信息 + 任务表单字段 -->
          <div>
            <div class="form-section-title">基础信息</div>
            <div class="form-group">
              <label class="form-label">任务类型 <span class="req">*</span></label>
              <select class="form-select" id="tpl-subType" onchange="onSubTypeChange()">
                <optgroup label="内置任务">
                  ${MOCK.taskTypes.builtin.map(x => `<option value="b:${x.id}">${x.name}</option>`).join('')}
                </optgroup>
                <optgroup label="自定义任务">
                  ${MOCK.taskTypes.custom.map(x => `<option value="c:${x.id}">${x.name}</option>`).join('')}
                </optgroup>
              </select>
              <div class="form-helper">先选任务类型，再关联表单（表单按类型筛选）</div>
            </div>
            <div class="form-group">
              <label class="form-label">关联任务表单 <span class="req">*</span></label>
              <select class="form-select" id="tpl-form" onchange="refreshFormPreview()">
                <!-- 由 onSubTypeChange 动态填充 -->
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">任务执行人 <span class="req">*</span></label>
              <select class="form-select" id="tpl-exec">
                <option>员工本人</option>
                <option>直接经理</option>
                <option>HRBP</option>
                <option>系统管理员</option>
                <option>指定人员</option>
              </select>
            </div>

            <div class="form-section-title">任务表单字段（预览）</div>
            <div class="field-preview-list" id="fieldPreview"></div>
            <button class="btn btn-sm" style="margin-top:8px" onclick="toast('跳转到任务表单设计器（暂不实现）')">
              📝 去表单中填写信息
            </button>
          </div>

          <!-- 右侧：触发时机 + 提醒规则 -->
          <div>
            <div class="form-section-title">触发时机</div>

            <div class="trigger-block">
              <div class="trigger-block-head">
                <span class="trigger-title">是否自动触发</span>
                <label class="switch"><input type="checkbox" id="tpl-auto" checked onchange="toggleAutoBlock(this.checked)"><span class="switch-slider"></span></label>
              </div>
              <div class="trigger-row" id="autoBlock">
                <span>触发时机：入职后第</span>
                <input class="inline-input" type="number" value="0" min="0">
                <span>天</span>
              </div>
              <div class="form-helper" style="margin-top:6px">关闭后，需在「未发起员工」手动发起</div>
            </div>

            <div class="trigger-block">
              <div class="trigger-block-head">
                <span class="trigger-title">是否有截止日期</span>
                <label class="switch"><input type="checkbox" id="tpl-hasDue" checked onchange="toggleDueBlock(this.checked)"><span class="switch-slider"></span></label>
              </div>
              <div class="trigger-row" id="dueBlock">
                <span>截止时机：入职后第</span>
                <input class="inline-input" type="number" value="7" min="0">
                <span>天</span>
              </div>
              <div class="form-helper" style="margin-top:6px">到达截止日仍未完成将置为「已过期」</div>
            </div>

            <div class="form-group">
              <label class="form-label">定时任务开始时间</label>
              <input class="form-input" type="date" id="tpl-startTime" value="2026-06-01">
              <div class="form-helper">早于该日期"应触发"的任务实例不会为员工补发</div>
            </div>

            <div class="form-section-title">钉钉提醒规则</div>
            <div class="remind-row">
              <span class="lbl">下发计划提醒</span>
              <select class="form-select" id="tpl-remindPub">
                <option value="">不提醒</option>
                ${MOCK.remindRules.flatMap(g => g.subs.map(s => `<option>${g.main} / ${s}</option>`)).join('')}
              </select>
            </div>
            <div class="remind-row">
              <span class="lbl">任务截止提醒</span>
              <select class="form-select" id="tpl-remindDue">
                <option value="">不提醒</option>
                ${MOCK.remindRules.flatMap(g => g.subs.map(s => `<option>${g.main} / ${s}</option>`)).join('')}
              </select>
            </div>
            <div class="form-helper">级联：主任务 / 子任务，引用「钉钉提醒」已有规则</div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeAddTemplateModal()">取消</button>
        <button class="btn btn-primary" onclick="saveTemplate()">完成</button>
      </div>
    </div>
  </div>
  `;
}
function openAddTemplateModal(tplId) {
  $('#addTplTitle').textContent = tplId ? '编辑任务模板' : '添加任务模板';
  $('#addTplMask').classList.add('show');
  // 默认联动初始化（先选第一个 内置类型）
  onSubTypeChange();
}
function closeAddTemplateModal() { $('#addTplMask').classList.remove('show'); }
function onSubTypeChange() {
  const v = $('#tpl-subType').value || '';
  const [kind, id] = v.split(':');
  // 联动出可选表单
  const forms = MOCK.taskForms.filter(f => f.subTypeId === id);
  const sel = $('#tpl-form');
  if (forms.length === 0) {
    sel.innerHTML = `<option value="">（该类型下暂无表单）</option>`;
  } else {
    sel.innerHTML = forms.map(f => `<option value="${f.id}">${f.name}${f.external ? '（内置表单）' : ''}</option>`).join('');
  }
  refreshFormPreview();
}
function refreshFormPreview() {
  const fid = $('#tpl-form').value;
  const f = MOCK.taskForms.find(x => x.id === fid);
  const box = $('#fieldPreview');
  if (!f) { box.innerHTML = `<div class="empty" style="padding:14px 0;">请选择任务表单</div>`; return; }
  box.innerHTML = f.fields.map(fd => `
    <div class="field-preview-item ${fd.locked ? 'locked' : ''}">
      <span class="fname">${fd.name}</span>
      <span class="ftype">${fd.type}${fd.locked ? ' · 只读' : ''}${fd.note ? '（' + fd.note + '）' : ''}</span>
    </div>
  `).join('') + (f.external ? `<div class="form-helper" style="margin-top:6px">该表单为内置业务模块维护，HR 不可修改字段</div>` : '');
}
function toggleAutoBlock(on) {
  const blk = $('#autoBlock');
  if (!blk) return;
  blk.classList.toggle('trigger-disabled', !on);
}
function toggleDueBlock(on) {
  const blk = $('#dueBlock');
  if (!blk) return;
  blk.classList.toggle('trigger-disabled', !on);
}
function saveTemplate() {
  const sub = $('#tpl-subType').value;
  const form = $('#tpl-form').value;
  if (!sub || !form) { toast('请完整选择任务类型与表单'); return; }
  closeAddTemplateModal();
  toast('任务模板已保存（演示）');
  // 演示：往当前阶段塞一条
  const plan = MOCK.plansSetting.find(p => p.id === state.editingPlan);
  if (plan && plan.stages[state.selectedPlanStage]) {
    plan.stages[state.selectedPlanStage].templates.push({
      id: 'NEW' + Date.now(), formId: form, exec: $('#tpl-exec').value,
      auto: $('#tpl-auto').checked, triggerDay: 0,
      hasDue: $('#tpl-hasDue').checked, dueDay: 7,
      startTime: $('#tpl-startTime').value,
      remindPub: $('#tpl-remindPub').value || '不提醒',
      remindDue: $('#tpl-remindDue').value || '不提醒',
    });
    renderMain();
  }
}
</script>

</body>
</html>
